apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-frontend
  labels:
    app: mywebsite
    tier: frontend
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 4
  template:
    metadata:
      name: nginx-2
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx
          image: nginx:1.30
  